name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: fastapi-logger
  DEPLOY_PORT: 8000

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << 'SSHEOF'
          Host vps
            HostName ${SSH_HOST}
            User ${SSH_USER}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          SSHEOF

      - name: Deploy
        run: |
          ssh vps << 'CMDS'
            set -e
            echo "=== Connected ==="
            hostname
            cd /root/fastapi-logger
            echo "Pulling..."
            git pull origin main
            echo "Building..."
            docker build -t ${{ env.IMAGE_NAME }}:latest .
            echo "Stopping old..."
            docker stop ${{ env.IMAGE_NAME }} 2>/dev/null || true
            docker rm ${{ env.IMAGE_NAME }} 2>/dev/null || true
            echo "Starting new..."
            docker run -d \
              --name ${{ env.IMAGE_NAME }} \
              --restart unless-stopped \
              -p ${{ env.DEPLOY_PORT }}:${{ env.DEPLOY_PORT }} \
              -v /root/fastapi-logger/data:/app/data \
              ${{ env.IMAGE_NAME }}:latest
            echo "Waiting for healthcheck..."
            sleep 5
            curl -sf http://127.0.0.1:${{ env.DEPLOY_PORT }}/health || {
              echo "Healthcheck failed!"
              docker logs ${{ env.IMAGE_NAME }}
              exit 1
            }
            echo "Deploy complete!"
          CMDS
