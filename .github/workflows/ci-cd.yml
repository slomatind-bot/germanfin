name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: fastapi-logger
  DEPLOY_HOST: 138.124.97.160
  DEPLOY_PORT: 8000

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Debug secrets
        run: |
          echo "Host: ${{ secrets.SERVER_HOST != '' && 'SET' || 'MISSING!' }}"
          echo "User: ${{ secrets.SERVER_USER != '' && 'SET' || 'MISSING!' }}"
          echo "SSH Key: ${{ secrets.DEPLOY_SSH_KEY != '' && 'SET' || 'MISSING!' }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "=== Connected to server ==="
            hostname
            echo "=== Status ==="
            cd /root/fastapi-logger

            echo "Pulling latest code..."
            git pull origin main

            echo "Building Docker image..."
            docker build -t ${{ env.IMAGE_NAME }}:latest .

            echo "Stopping old container..."
            docker stop ${{ env.IMAGE_NAME }} 2>/dev/null || true
            docker rm ${{ env.IMAGE_NAME }} 2>/dev/null || true

            echo "Starting new container..."
            docker run -d \
              --name ${{ env.IMAGE_NAME }} \
              --restart unless-stopped \
              -p ${{ env.DEPLOY_PORT }}:${{ env.DEPLOY_PORT }} \
              -v /root/fastapi-logger/data:/app/data \
              ${{ env.IMAGE_NAME }}:latest

            echo "Waiting for healthcheck..."
            sleep 5
            curl -sf http://127.0.0.1:${{ env.DEPLOY_PORT }}/health || {
              echo "Healthcheck failed!"
              docker logs ${{ env.IMAGE_NAME }}
              exit 1
            }
            echo "Deploy complete!"
