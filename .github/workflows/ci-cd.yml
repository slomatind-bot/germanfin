name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install -r requirements.txt --break-system-packages

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

  deploy:
    name: Deploy
    needs: test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fastapi-logger:latest .

      - name: Deploy container
        run: |
          docker stop fastapi-logger 2>/dev/null || true
          docker rm fastapi-logger 2>/dev/null || true
          docker run -d \
            --name fastapi-logger \
            --restart unless-stopped \
            -p 8000:8000 \
            -v /root/fastapi-logger/data:/app/data \
            fastapi-logger:latest

      - name: Healthcheck
        run: |
          sleep 5
          curl -sf http://127.0.0.1:8000/health || {
            echo "Healthcheck failed!"
            docker logs fastapi-logger
            exit 1
          }
          echo "Deploy complete!"
